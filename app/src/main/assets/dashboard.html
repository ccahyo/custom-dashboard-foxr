<body>

<div class="dashboard">
<div class="canvas">
<div class="panel">

    <!-- ================================================= -->
    <!-- GAUGE -->
    <!-- ================================================= -->

    <div class="gauge-group" id="gauge-group">
        <div class="gauge" id="gauge">

            <!-- ================================================= -->
            <!-- AMPEREMETER -->
            <!-- ================================================= -->

            <div class="gauge-label">x10 A</div>

            <div class="needle" id="needle"></div>
            <div class="needle-tail" id="needle-tail"></div>

            <div class="center-core"></div>

            <!-- ================================================= -->
            <!-- SPEED -->
            <!-- ================================================= -->

            <div class="speed-box">
                <div id="speedSourceIcon" class="speed-source-icon"></div>

                <div class="speed-container">
                    <span class="speed" id="speed">0</span>
                    <span class="kmh">KM/H</span>
                </div>
            </div>
            
            <div class="center-cap"></div>

        </div>

        <!-- ================================================= -->
        <!-- RPM -->
        <!-- ================================================= -->

        <div class="rpm-info">
            <div id="rpm">0</div> <div class="rpm-unit">RPM</div>
        </div>

        <!-- ================================================= -->
        <!-- Current Time -->
        <!-- ================================================= -->

        <div class="time-info">
            <div class="time-label">Time</div>
            <div class="time-hours-minutes" id="hours-minutes">00:00</div>
        </div>
    </div>

    <div class="display-group">

        <!-- ================================================= -->
        <!-- TEMP BAR -->
        <!-- ================================================= -->

        <div class="temp-bars">
            <div class="curmode" id="curmode">PEV HUD</div>
                    <!-- BLDC TEMP BAR -->
            <div>
                <div class="bar-column" id="bldcTempBars"></div>
                <div class="bar-label">BLDC</div>
            </div>
                    <!-- CTRL TEMP BAR -->
            <div>
                <div class="bar-column" id="ctrlTempBars"></div>
                <div class="bar-label">CTRL</div>
            </div>
            <div class="temp">
                <p>Temperature</p>
                <p>x10 ℃</p>
            </div>
        </div>

        <!-- ================================================= -->
        <!-- BATTERY BAR -->
        <!-- ================================================= -->

        <!-- BATTERY -->

        <div class="battery-section">

            <div class="battery-title">
                <span>Battery SoC</span>
                <span class="battery-value" id="battSOC">0%</span>
            </div>

            <div class="battery-bar" id="batteryBar"></div>

        </div>

        <!-- INFO -->

        <div class="info-grid">

            <div class="info">
                <div class="label">Voltage</div>
                <div class="value" id="battVolt">0.0 V</div>
            </div>

            <div class="info">
                <div class="label">Current</div>
                <div class="value" id="battCurr">0.0 A</div>
            </div>

            <div class="info">
                <div class="label">Power</div>
                <div class="value" id="battPow">0 W</div>
            </div>

            <div class="info">
                <div class="label">Temperature</div>
                <div class="value" id="battTemp">0 ℃</div>
            </div>

        </div>
        
    </div>

    <!-- ================================================= -->
    <!-- BOTTOM -->
    <!-- ================================================= -->

        <!-- <div class="bottom-card"> -->

    </div>

</div>
</div>
</div>

<script src="js/updatedashboard.js"></script>

<script>
/* ===================================================== */
/* dynamicscreen */
/* ===================================================== */
function scaleDashboard() {
    const panel = document.querySelector('.panel');

    /*
     * Base scale fits the original 1280x720 canvas.
     * Zoom fills the screen better.
     *
     * If the dashboard is cropped, reduce --dashboard-zoom in :root.
     * If it is still too small, increase it carefully.
     */
    const baseScale = Math.min(
        window.innerWidth / 1280,
        window.innerHeight / 720
    );

    const zoom = parseFloat(
        getComputedStyle(document.documentElement)
            .getPropertyValue('--dashboard-zoom')
    ) || 1;

    panel.style.transform = `scale(${baseScale * zoom})`;
}
window.addEventListener('resize', scaleDashboard);
window.addEventListener('orientationchange', scaleDashboard);
window.addEventListener('load', scaleDashboard);
requestAnimationFrame(scaleDashboard);
scaleDashboard();
</script>

/*
 * updateDashboard() opens one WebSocket connection.
 * Do not call it repeatedly with setInterval.
 */
</script>

</body>
